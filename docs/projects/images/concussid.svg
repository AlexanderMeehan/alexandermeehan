<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="ConcussID player welfare">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#2A4A3A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg3)"/>

  <!-- Helmet silhouette -->
  <g transform="translate(150,90)">
    <path d="M0 120 Q0 0 150 0 Q300 0 300 120 L300 170 Q300 200 270 200 L240 200 L240 180 Q240 150 200 150 L100 150 Q60 150 60 180 L60 200 L30 200 Q0 200 0 170 Z"
          fill="#C9A84C"/>
    <!-- Face guard bars -->
    <g stroke="#1B2A4A" stroke-width="6" stroke-linecap="round">
      <line x1="65" y1="165" x2="235" y2="165"/>
      <line x1="65" y1="185" x2="235" y2="185"/>
      <line x1="110" y1="150" x2="110" y2="200"/>
      <line x1="150" y1="150" x2="150" y2="200"/>
      <line x1="190" y1="150" x2="190" y2="200"/>
    </g>
    <!-- Highlight -->
    <path d="M40 60 Q60 20 110 20" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- AI / circuit node overlay (top-right) -->
  <g transform="translate(430,60)" fill="none" stroke="#ffffff" stroke-width="3">
    <circle cx="30" cy="30" r="10" fill="#ffffff"/>
    <circle cx="80" cy="10" r="6" fill="#ffffff"/>
    <circle cx="100" cy="60" r="6" fill="#ffffff"/>
    <circle cx="40" cy="80" r="6" fill="#ffffff"/>
    <line x1="30" y1="30" x2="80" y2="10"/>
    <line x1="30" y1="30" x2="100" y2="60"/>
    <line x1="30" y1="30" x2="40" y2="80"/>
    <line x1="80" y1="10" x2="100" y2="60"/>
  </g>

  <!-- Heartbeat pulse along bottom -->
  <polyline points="60,320 180,320 210,320 230,290 250,350 270,280 290,320 420,320 440,320 460,300 480,320 540,320"
            fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <text x="300" y="370" text-anchor="middle" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="1">
    AI · Diagnosis · Player Welfare
  </text>
</svg>
