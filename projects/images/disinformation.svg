<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Disinformation and conflict">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#3A2B5A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>

  <!-- Megaphone -->
  <g transform="translate(80,130)">
    <path d="M0 60 L110 20 L110 140 L0 100 Z" fill="#C9A84C"/>
    <rect x="110" y="50" width="40" height="60" fill="#C9A84C"/>
    <rect x="150" y="58" width="18" height="44" rx="3" fill="#ffffff"/>
  </g>

  <!-- Distorted sound waves (radiating right) -->
  <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
    <path d="M270 170 Q310 140 280 120"/>
    <path d="M290 210 Q345 210 330 170"/>
    <path d="M270 260 Q320 280 290 310"/>
  </g>

  <!-- Jagged "broken" crack cutting across -->
  <polyline
    points="380,80 420,140 390,180 440,230 400,290 450,340"
    fill="none" stroke="#CC3333" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Speech bubbles -->
  <g fill="#ffffff">
    <path d="M470 90 h80 a14 14 0 0 1 14 14 v40 a14 14 0 0 1 -14 14 h-50 l-15 18 v-18 h-15 a14 14 0 0 1 -14 -14 v-40 a14 14 0 0 1 14 -14 z"/>
  </g>
  <g fill="#C9A84C">
    <path d="M470 240 h80 a14 14 0 0 1 14 14 v40 a14 14 0 0 1 -14 14 h-50 l-15 18 v-18 h-15 a14 14 0 0 1 -14 -14 v-40 a14 14 0 0 1 14 -14 z"/>
  </g>

  <text x="300" y="370" text-anchor="middle" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="1">
    Narratives · Bias · Conflict
  </text>
</svg>
